<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KaZeTab Settings</title>
  <link rel="stylesheet" href="./css/settings.css">
</head>

<body class="settings-page">
  <main class="settings-shell">
    <section class="settings-hero">
      <p class="eyebrow">KaZeTab Control Room</p>
      <h1>Shape how every new tab feels.</h1>
      <p class="hero-copy">
        Pick a single vibe for the whole day or let KaZeTab shift through morning, afternoon, evening, and night.
      </p>
    </section>

    <section class="settings-panel" id="Wallpaper">
      <div class="mode-select">
        <div class="mode-copy">
          <h2>Wallpaper Mode</h2>
          <p>Choose whether KaZeTab keeps one consistent mood or swaps styles across the day.</p>
        </div>

        <div class="mode-actions">
          <button id="mode-different" type="button" class="mode-button">Different by time</button>
          <button id="mode-same" type="button" class="mode-button">Same for all times</button>
        </div>
      </div>

      <form id="settings-form" class="settings-form hiddenc">
        <section class="settings-card">
          <div class="field-group">
            <label for="Wallpaper-options" class="field-label">Wallpaper style</label>
            <select required id="Wallpaper-options" class="field-control">
              <option selected hidden disabled value="select">Select</option>
              <option value="coding">Coding</option>
              <option value="nature">Nature</option>
              <option value="anime">Anime</option>
              <option value="space">Space</option>
              <option value="typeagenre">Type a Genre</option>
            </select>
          </div>

          <div id="typeagenre" class="field-inline hiddenc">
            <label class="field-label" for="genre-input">Custom genre</label>
            <input type="text" id="genre-input" class="field-control" placeholder="lofi room, cyber city, cozy desk...">
          </div>
        </section>

        <section class="settings-card">
          <div class="toggle-list">
            <label class="toggle-row" for="timebased_wallpaper">
              <span>
                <strong>Same genre, different times</strong>
                <small>Keep one theme and refresh it across the day.</small>
              </span>
              <input type="checkbox" role="switch" id="timebased_wallpaper">
            </label>

            <label class="toggle-row" for="timebased_greetings">
              <span>
                <strong>Time-based greeting</strong>
                <small>Show a greeting that changes with the hour.</small>
              </span>
              <input type="checkbox" role="switch" id="timebased_greetings">
            </label>

            <label class="toggle-row" for="Show_Bookmakrs">
              <span>
                <strong>Show quick links</strong>
                <small>Display bookmarks at the top of the new tab page.</small>
              </span>
              <input type="checkbox" role="switch" id="Show_Bookmakrs" checked>
            </label>
          </div>
        </section>

        <div class="form-actions">
          <button type="submit" class="primary-button">Save KaZeTab</button>
        </div>
      </form>

      <form id="custom-settings-form" class="settings-form hiddenc">
        <div class="slot-grid">
          <section class="slot-card">
            <div class="field-group">
              <label for="Wallpaper-options-morning" class="field-label">Morning mood</label>
              <select required id="Wallpaper-options-morning" class="field-control">
                <option selected hidden disabled value="select">Select</option>
                <option value="coding">Coding</option>
                <option value="nature">Nature</option>
                <option value="anime">Anime</option>
                <option value="space">Space</option>
                <option value="typeagenre_morning">Type a Genre</option>
              </select>
            </div>

            <div id="typeagenre_morning" class="field-inline hiddenc">
              <label class="field-label" for="genre-input-morning">Morning genre</label>
              <input type="text" id="genre-input-morning" class="field-control" placeholder="sunrise, study desk, calm anime">
            </div>
          </section>

          <section class="slot-card">
            <div class="field-group">
              <label for="Wallpaper-options-afternoon" class="field-label">Afternoon mood</label>
              <select required id="Wallpaper-options-afternoon" class="field-control">
                <option selected hidden disabled value="select">Select</option>
                <option value="coding">Coding</option>
                <option value="nature">Nature</option>
                <option value="anime">Anime</option>
                <option value="space">Space</option>
                <option value="typeagenre_afternoon">Type a Genre</option>
              </select>
            </div>

            <div id="typeagenre_afternoon" class="field-inline hiddenc">
              <label class="field-label" for="genre-input-afternoon">Afternoon genre</label>
              <input type="text" id="genre-input-afternoon" class="field-control" placeholder="creative setup, forest, city pop">
            </div>
          </section>

          <section class="slot-card">
            <div class="field-group">
              <label for="Wallpaper-options-evening" class="field-label">Evening mood</label>
              <select required id="Wallpaper-options-evening" class="field-control">
                <option selected hidden disabled value="select">Select</option>
                <option value="coding">Coding</option>
                <option value="nature">Nature</option>
                <option value="anime">Anime</option>
                <option value="space">Space</option>
                <option value="typeagenre_evening">Type a Genre</option>
              </select>
            </div>

            <div id="typeagenre_evening" class="field-inline hiddenc">
              <label class="field-label" for="genre-input-evening">Evening genre</label>
              <input type="text" id="genre-input-evening" class="field-control" placeholder="neon city, rain room, synthwave">
            </div>
          </section>

          <section class="slot-card">
            <div class="field-group">
              <label for="Wallpaper-options-night" class="field-label">Night mood</label>
              <select required id="Wallpaper-options-night" class="field-control">
                <option selected hidden disabled value="select">Select</option>
                <option value="coding">Coding</option>
                <option value="nature">Nature</option>
                <option value="anime">Anime</option>
                <option value="space">Space</option>
                <option value="typeagenre_night">Type a Genre</option>
              </select>
            </div>

            <div id="typeagenre_night" class="field-inline hiddenc">
              <label class="field-label" for="genre-input-night">Night genre</label>
              <input type="text" id="genre-input-night" class="field-control" placeholder="midnight sky, dark room, lo-fi">
            </div>
          </section>
        </div>

        <div class="form-actions">
          <button type="submit" class="primary-button">Save Schedule</button>
        </div>
      </form>
    </section>
  </main>

  <script src="scripts/settings.js" defer></script>
</body>

</html>
